<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Malveon Tasks</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4f8cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Malveon">
  <link rel="apple-touch-icon" href="./malveon-icon-192.png">
  <meta name="description"
    content="Malveon Tasks - A high-performance personal task manager and CRM with cloud sync and desktop integration.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- Auth Screen -->
  <div class="auth-screen" id="authScreen" style="display:none">
    <div class="auth-card">
      <div class="auth-logo">
        <h1><span>M</span>alveon Tasks</h1>
        <p>Sign in to sync across all your devices</p>
      </div>
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@email.com">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Your password">
      <div class="auth-error" id="authError"></div>
      <div class="auth-actions">
        <button class="auth-btn-secondary" onclick="authAction('signup')">Create Account</button>
        <button class="auth-btn-primary" onclick="authAction('signin')">Sign In</button>
      </div>
      <div class="auth-skip">
        <a onclick="skipAuth()">Skip - use offline only</a>
      </div>
    </div>
  </div>

  <!-- Main App (hidden until auth) -->
  <div id="mainApp">
    <div class="header">
      <div class="header-top">
        <div>
          <h1><span>M</span>alveon Tasks</h1>
          <div class="date" id="dateDisplay"></div>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <div class="streak" id="streakDisplay"></div>
          <div class="score-badge">
            <span class="num" id="scoreNum">0</span>/10
          </div>
        </div>
      </div>
      <div class="progress-wrap" style="margin-top:12px">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressText">0 of 0 done</span>
        <span id="progressPct">0%</span>
      </div>
    </div>

    <div class="tabs" id="tabsContainer"></div>
    <div id="quickCapture" class="quick-capture" style="display:none">
      <input type="text" id="quickCaptureInput" placeholder="Quick add a task..."
        onkeydown="if(event.key==='Enter')quickAdd()">
    </div>
    <div id="reviewPrompt"></div>
    <div class="task-list" id="taskList"></div>
    <div class="playbook-section" id="playbookSection"></div>
    <div class="sync-section" id="syncSection" style="display:none"></div>

    <button class="fab" id="fabBtn" onclick="openAddModal()">+</button>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal" id="modalContent">
        <h2 id="modalTitle">Add Task</h2>
        <label>Task</label>
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <label>Category</label>
        <select id="categoryInput">
          <option value="today">Today</option>
          <option value="this-week">This Week</option>
          <option value="before-pilot">Before First Pilot</option>
          <option value="waiting">Waiting On</option>
          <option value="someday">Someday</option>
        </select>
        <label>Priority</label>
        <select id="priorityInput">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <label>Notes (optional)</label>
        <textarea id="notesInput" placeholder="Extra details..."></textarea>
        <label>Remind me at (optional)</label>
        <input type="time" id="reminderInput"
          style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none">
        <div class="modal-actions" id="modalActions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" onclick="saveTask()">Add Task</button>
        </div>
      </div>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
      <div class="modal">
        <h2>Daily Self-Review</h2>
        <label>What went well today?</label>
        <textarea id="reviewWell" placeholder="One or two things that worked..."></textarea>
        <label>What blocked me?</label>
        <textarea id="reviewBlock" placeholder="What stopped progress..."></textarea>
        <label>What will I do differently tomorrow?</label>
        <textarea id="reviewDiff" placeholder="One change for tomorrow..."></textarea>
        <label>Energy (1-5)</label>
        <select id="reviewEnergy">
          <option>1</option>
          <option>2</option>
          <option selected>3</option>
          <option>4</option>
          <option>5</option>
        </select>
        <label>Focus (1-5)</label>
        <select id="reviewFocus">
          <option>1</option>
          <option>2</option>
          <option selected>3</option>
          <option>4</option>
          <option>5</option>
        </select>
        <label>Execution (1-5)</label>
        <select id="reviewExec">
          <option>1</option>
          <option>2</option>
          <option selected>3</option>
          <option>4</option>
          <option>5</option>
        </select>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeReviewModal()">Skip</button>
          <button class="btn-save" onclick="saveReview()">Save Review</button>
        </div>
      </div>
    </div>

    <!-- Task Detail Panel -->
    <div class="detail-overlay" id="detailOverlay">
      <div class="detail-panel" id="detailPanel"></div>
    </div>

    <!-- Resource Add/Edit Modal -->
    <div class="resource-modal-overlay" id="resourceModal">
      <div class="modal">
        <h2 id="resourceModalTitle">Add Resource</h2>
        <label>Title</label>
        <input type="text" id="resourceTitleInput" placeholder="Resource title...">
        <label>Type</label>
        <select id="resourceTypeInput">
          <option value="outreach-plan">Outreach Plan</option>
          <option value="ops">Operations</option>
          <option value="positioning">Positioning</option>
          <option value="playbook">Playbook</option>
          <option value="reference">Reference</option>
        </select>
        <label>Content</label>
        <textarea id="resourceContentInput" placeholder="Write content here..." style="min-height:120px"></textarea>
        <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
          <input type="checkbox" id="resourcePinnedInput" style="width:auto">
          <label style="margin:0" for="resourcePinnedInput">Pin to top</label>
        </div>
        <div class="modal-actions" id="resourceModalActions">
          <button class="btn-cancel" onclick="closeResourceModal()">Cancel</button>
          <button class="btn-save" onclick="saveResource()">Add</button>
        </div>
      </div>
    </div>

  </div><!-- /mainApp -->

  <script src="./app.js"></script>
</body>

</html>
